name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.0.0"
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          if-no-files-found: error

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist
            packages/*/.tsbuildinfo
          if-no-files-found: error

  test-unit:
    name: test / unit
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.0.0"
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Run unit tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: error

  package:
    name: package
    runs-on: ubuntu-latest
    needs:
      - build
      - test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.0.0"
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Verify workspace packages
        run: npm pack --workspaces

  quality-crap-cognitive-typescript:
    name: verify / quality-crap-cognitive-typescript
    runs-on: ubuntu-latest
    needs:
      - build
      - test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.0.0"
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Run crap-typescript gate
        run: npm run crap-typescript-check

  quality-cognitive-cognitive-typescript:
    name: verify / quality-cognitive-cognitive-typescript
    runs-on: ubuntu-latest
    needs:
      - build
      - test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.0.0"
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Run cognitive-typescript gate
        run: npm run cognitive-typescript-check

